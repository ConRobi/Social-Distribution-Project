{% extends 'base.html' %}

{% block title %}Edit Post{% endblock %}

{% block extra_css %}
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/edit_post.css' %}">
{% endblock %}

{% block content %}
<div class="edit-post-container">
    <h2>Edit Post</h2>
    <form method="POST" enctype="multipart/form-data" action="{% url 'SocialDistribution:edit-post' author.uuid post.uuid %}">
        {% csrf_token %}
        <label for="title">Title:</label>
        <input type="text" name="title" value="{{ post.title }}" required>

        <label for="description">Description:</label>
        <input type="text" name="description" value="{{ post.description }}" required>

        <label for="contentType">Content Type:</label>
        <select name="contentType">
            <option value="text/plain" {% if post.contentType == "text/plain" %}selected{% endif %}>Plaintext</option>
            <option value="text/markdown" {% if post.contentType == "text/markdown" %}selected{% endif %}>CommonMark</option>
            <option value="image/png;base64" {% if post.contentType == "image/png;base64" %}selected{% endif %}>PNG Image</option>
            <option value="image/jpeg;base64" {% if post.contentType == "image/jpeg;base64" %}selected{% endif %}>JPEG Image</option>
            <option value="application/base64" {% if post.contentType == "application/base64" %}selected{% endif %}>Other Image</option>
        </select>

        <label for="content">Content:</label>
        <textarea name="content" required>{{ post.content }}</textarea>

        <label for="visibility">Visibility:</label>
        <select name="visibility">
            <option value="PUBLIC" {% if post.visibility == "PUBLIC" %}selected{% endif %}>Public</option>
            <option value="FRIENDS" {% if post.visibility == "FRIENDS" %}selected{% endif %}>Friends</option>
            <option value="UNLISTED" {% if post.visibility == "UNLISTED" %}selected{% endif %}>Unlisted</option>
        </select>

        <label for="image">Upload New Image (Optional):</label>
        <input type="file" name="image">

        <button type="submit">Save Changes</button>
        <a href="{% url 'SocialDistribution:view-profile' author.uuid %}">Cancel</a>
    </form>
</div>
{% endblock %}
