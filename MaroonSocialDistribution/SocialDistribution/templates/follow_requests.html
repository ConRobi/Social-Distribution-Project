<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Follow Requests</title>
    {% load static %}
    <link rel="stylesheet" type="text/css" href="{% static 'css/default.css' %}">
</head>
<body>
    <h2>Follow Requests</h2>
    
    <a href="{% url 'SocialDistribution:view-profile' request.user.uuid %}">Back to Profile</a>

    {% if follow_requests %}
        <ul>
            {% for request in follow_requests %}
                <li>
                    {{ request.sender.display_name }}
                    <form method="POST" action="{% url 'SocialDistribution:accept-follow-request' request.sender.uuid %}">
                        {% csrf_token %}
                        <button type="submit">Accept</button>
                    </form>
                    <form method="POST" action="{% url 'SocialDistribution:reject-follow-request' request.sender.uuid %}">
                        {% csrf_token %}
                        <button type="submit">Reject</button>
                    </form>
                </li>
            {% endfor %}
        </ul>
    {% else %}
        <p>No pending follow requests.</p>
    {% endif %}
</body>
</html>
