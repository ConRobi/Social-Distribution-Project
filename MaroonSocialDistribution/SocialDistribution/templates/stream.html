{% for post in posts %}
    <li>
        <!-- Author Profile -->
        <div style="display: flex; align-items: center;">
            <!-- Profile Image -->
            <img src="{{ post.author.profile_image }}" alt="{{ post.author.display_name }}" 
                 style="width: 50px; height: 50px; border-radius: 50%; margin-right: 10px;">

            <!-- Author Name & Link to Profile -->
            <a href="{% url 'SocialDistribution:view-profile' post.author.id|slice:'-36:' %}">
                <strong>{{ post.author.display_name }}</strong>
            </a>
            
            
            
        </div>

        <!-- Post Content -->
        <h2>{{ post.title }}</h2>
        <p>{{ post.description }}</p>
        <p><strong>Visibility:</strong> {{ post.visibility }}</p>
        <p><strong>Published:</strong> {{ post.published }}</p>
    </li>
{% endfor %}
