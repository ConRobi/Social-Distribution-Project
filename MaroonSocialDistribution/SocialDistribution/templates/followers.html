<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Followers</title>
    {% load static %}
    <link rel="stylesheet" type="text/css" href="{% static 'css/default.css' %}">
</head>
<body>
    <h2>Followers</h2>
    
    <a href="{% url 'SocialDistribution:view-profile' request.user.uuid %}" style="text-decoration: none; color: black;">Back to Profile</a>

    {% if followers %}
        <ul>
            {% for follower in followers %}
                <li>
                    {{ follower.display_name }} 
                    <form method="POST" action="{% url 'SocialDistribution:remove-follower' follower.uuid %}" style="display: inline;">
                        {% csrf_token %}
                        <button type="submit" style="background: none; color: black; border: none; cursor: pointer; text-decoration: underline; font-weight: bold;">
                            Remove
                        </button>
                    </form>
                </li>
            {% endfor %}
        </ul>
    {% else %}
        <p>You have no followers.</p>
    {% endif %}
</body>
</html>
