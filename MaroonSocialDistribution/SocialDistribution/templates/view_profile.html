<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile</title>
</head>
<body>
    <h2>My Profile</h2>
    <p>Display name: {{ author.display_name }}</p>
    <p>Github Account: {{ author.github }}</p>
    <p>Profile Image: {{ author.profile_image }}</p>
    <a href="{% url 'SocialDistribution:edit-profile' author.uuid %}">
        <button>Edit Profile</button>
    </a>
</body>
</html>
