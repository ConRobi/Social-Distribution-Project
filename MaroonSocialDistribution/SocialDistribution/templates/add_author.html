<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Author</title>
    {% load static %}
    <link rel="stylesheet" type="text/css" href="{% static 'css/default.css' %}">
</head>
<body>
    <div class="add_author_body">
        <h2>Add Author</h2>
        <form method="POST" enctype="multipart/form-data" action="{% url 'SocialDistribution:add-author' %}">
            {% csrf_token %}
            <label for="username">Username:</label>
            <input type="text" name="username" required><br><br>

            <label for="display_name">Display Name:</label>
            <input type="text" name="display_name" required><br><br>

            <label for="github">GitHub URL:</label>
            <input type="url" name="github" required><br><br>

            <label for="profile_image">Upload Profile Image:</label>
            <input type="file" name="profile_image"><br><br>

            <label for="password1">Password:</label>
            <input type="password" name="password1" required><br><br>

            <label for="password2">Confirm Password:</label>
            <input type="password" name="password2" required><br><br>

            <button type="submit">Add Author</button>
        </form>
    </div>
</body>
</html>
